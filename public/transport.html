<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldville | Premium Transport</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-crown"></i> Premium transportation
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="hotels.html">Hotels</a></li>
            <li><a href="transport.html" class="active">Transport</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1>🚗 <span class="gold-text">Premium Transport</span></h1>
        <p>Ride in style with our luxury fleet</p>
    </div>

    <div class="container">
        <div class="transport-grid" id="transportGrid">
        </div>

        <div class="custom-booking-form">
            <h3><i class="fas fa-calendar-check"></i> Custom Ride Request</h3>
            <form id="rideForm">
                <input type="text" id="pickupLocation" placeholder="Pick-up address" required>
                <input type="text" id="dropoffLocation" placeholder="Destination" required>
                <select id="vehicleSelect" required>
                    <option value="">Select vehicle</option>
                    <option value="Luxury SUV">Luxury SUV (ksh75,000)</option>
                    <option value="Luxury sedan">Luxury sedan (ksh40,000)</option>
                    <option value="Luxury coupes">Luxury coupes(2-sitter) (ksh25,000)</option>
                </select>
                <input type="datetime-local" id="rideDateTime" required>
                <button type="submit" class="btn btn-primary btn-block">Reserve Ride →</button>
            </form>
        </div>

        <div class="booking-summary">
            <h3><i class="fas fa-ticket-alt"></i> Your Ride Bookings</h3>
            <div id="transportBookingList">No rides booked yet.</div>
            <button id="clearTransportBtn" class="btn-small">Clear All Rides</button>
        </div>
    </div>

    <footer><i style="color: goldenrod;">
        <p>✦ GoldenStay — Your Premier Travel Companion ✦</p>
        <p><i class="fas fa-phone-alt"></i> 254 792188853 | <i class="fas fa-envelope"></i> goldville@hotelbookings.com</p>
    </i></footer>

    <script src="script.js" defer></script>
</body>
</html>
